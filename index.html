<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F4H Sistema</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <img src="logo-v2.png" alt="F4H" class="nav-logo">
  <div class="nav-tabs">
    <button class="tab on" onclick="go('dash')">Dashboard</button>
    <button class="tab" onclick="go('tattoos')">Tatuajes</button>
    <button class="tab" onclick="go('inv')">Inventario</button>
    <button class="tab" onclick="go('act')">Activos</button>
    <button class="tab" onclick="go('ses')">Sesiones</button>
    <button class="tab" onclick="go('new')">+ Nuevo</button>
    <button class="tab" onclick="go('egresos')">Egresos</button>
    <button class="tab" onclick="go('mov')">Movimientos</button>
    <button class="tab" onclick="go('cfg')">Config</button>
  </div>
  <span class="nav-right" id="tc-display"></span>
</nav>

<!-- SIDE IMAGES -->
<div class="side side-left"><img src="mockups/assets/fuego.jpg" alt=""></div>
<div class="side side-right"><img src="mockups/assets/hannya.jpg" alt=""></div>

<!-- INJECT BANNER -->
<div id="inject-banner" class="inject-banner"></div>

<!-- CONTENT -->
<div class="outer">
<div class="app">

<div id="t-dash"></div>
<div id="t-tattoos" style="display:none"></div>
<div id="t-inv" style="display:none"></div>
<div id="t-act" style="display:none"></div>
<div id="t-ses" style="display:none"></div>
<div id="t-egresos" style="display:none"></div>

<div id="t-new" style="display:none">
  <div class="card">
    <div class="ct">Registrar nuevo producto</div>
    <div class="fgrid">
      <div class="fg" style="grid-column:1/-1"><label class="fl">Nombre</label><input id="np-nom" placeholder="Ej: Cartucho #12 Curved Mag"></div>
      <div class="fg"><label class="fl">Categor&#237;a</label><select id="np-cat" onchange="toggleNewFields()"><option>Activo</option><option>Descartable</option><option>Consumible</option><option>Aguja</option></select></div>
      <div class="fg"><label class="fl">Subcategor&#237;a</label><input id="np-sub"></div>
      <div class="fg"><label class="fl">Unidad</label><select id="np-um"><option>Unidad</option><option>Caja (100u)</option><option>Caja (50u)</option><option>Onza</option><option>ml</option><option>Uso</option></select></div>
      <div class="fg"><label class="fl">Moneda</label><select id="np-mon"><option value="ARS">ARS $</option><option value="USD">USD u$s</option></select></div>
      <div class="fg"><label class="fl">Costo unitario</label><input id="np-cu" type="number" min="0" step="0.01" value="0"></div>
      <div class="fg"><label class="fl">Usos por unidad</label><input id="np-upu" type="number" min="1" value="1"></div>
      <div class="fg"><label class="fl">Stock actual</label><input id="np-si" type="number" min="0" value="1"></div>
      <div class="fg"><label class="fl">Stock m&#237;nimo</label><input id="np-sm" type="number" min="0" value="1"></div>
      <div class="fg" id="vum-field"><label class="fl">Vida &#250;til (meses)</label><input id="np-vum" type="number" min="1" value="24"></div>
      <div class="fg" id="prac-field" style="display:none;grid-column:1/-1"><label class="fl" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="np-prac" style="width:auto"> Aguja de pr&#225;ctica (no descuenta stock)</label></div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:8px;align-items:center">
      <button class="btn btn-p" onclick="addProd()">Guardar</button>
      <button class="btn" onclick="clearNewForm()">Limpiar</button>
      <span id="np-msg"></span>
    </div>
  </div>
</div>

<div id="t-mov" style="display:none">
  <div class="card">
    <div class="ct">Registrar movimiento</div>
    <div class="fgrid">
      <div class="fg"><label class="fl">Producto</label><select id="mv-prod" onchange="onMovChange()"></select></div>
      <div class="fg"><label class="fl">Tipo</label><select id="mv-tipo" onchange="onMovChange()"><option value="entrada">Entrada (+)</option><option value="salida">Salida (&#8722;)</option></select></div>
      <div class="fg"><label class="fl">Cantidad</label><input id="mv-qty" type="number" min="1" value="1"></div>
      <div class="fg" id="mv-unidad-wrap" style="display:none"><label class="fl">Unidad de salida</label>
        <select id="mv-unidad"><option value="unidad">Unidad / caja completa</option><option value="uso">Usos individuales</option></select>
      </div>
      <div class="fg" id="mv-costo-wrap" style="display:none">
        <label class="fl">Costo unitario de esta compra <span style="color:var(--accent)">(actualiza promedio)</span></label>
        <input id="mv-costo" type="number" min="0" step="1" placeholder="Vac&#237;o = mantener actual">
      </div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">Referencia</label><input id="mv-ref" placeholder="Ej: Compra MeLi, proveedor, fecha"></div>
    </div>
    <div id="mv-info" class="hint" style="margin:.4rem 0"></div>
    <div style="margin-top:.75rem;display:flex;gap:8px;align-items:center">
      <button class="btn btn-p" onclick="addMov()">Registrar</button><span id="mv-msg"></span>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden"><table>
    <thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cant.</th><th>Costo unit.</th><th>Referencia</th><th>Stock post</th></tr></thead>
    <tbody id="mv-body"></tbody>
  </table></div>
</div>

<div id="t-cfg" style="display:none">
  <div class="card">
    <div class="ct">Tipo de cambio</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="hint">USD 1 =</span><input id="tc-val" type="number" min="1" step="1" style="width:110px"><span class="hint">ARS</span>
      <button class="btn btn-sm" onclick="saveTc()">Actualizar</button><span id="tc-msg"></span>
    </div>
  </div>
  <div class="card">
    <div class="ct">Sesiones por mes</div>
    <div style="display:flex;align-items:center;gap:10px">
      <input id="spm-val" type="number" min="1" step="1" style="width:80px"><span class="hint">ses/mes</span>
      <button class="btn btn-sm" onclick="saveSpm()">Actualizar</button><span id="spm-msg"></span>
    </div>
  </div>
  <div class="card"><div class="ct">Kit base</div><div id="kit-cfg-body"></div></div>
  <div class="card"><div class="ct">Datos</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="exportJSON()">Exportar JSON</button>
      <button class="btn btn-sm" onclick="importJSON()">Importar JSON</button>
      <button class="btn btn-sm btn-danger" onclick="if(confirm('&#191;Borrar TODO?'))resetAll()">Reset</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(this)">
    <p class="hint" style="margin-top:6px">Datos guardados en este navegador. Export&#225; JSON para backup.</p>
  </div>
</div>

</div><!-- /.app -->
</div><!-- /.outer -->

<script src="js/state.js"></script>
<script src="js/core.js"></script>
<script src="js/calc.js"></script>
<script src="js/ui.js"></script>
<script src="js/views/dash.js"></script>
<script src="js/views/tattoos.js"></script>
<script src="js/views/inventory.js"></script>
<script src="js/views/activos.js"></script>
<script src="js/views/sessions.js"></script>
<script src="js/views/egresos.js"></script>
<script src="js/views/movements.js"></script>
<script src="js/views/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
