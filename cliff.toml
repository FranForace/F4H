[changelog]
header = "# Changelog — F4H Sistema\n\nHistorial de cambios del sistema de gestión. Actualizado automáticamente al mergear a `main`.\n\n"
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%d/%m/%Y") }}
{% else %}\
## {{ timestamp | date(format="%d/%m/%Y") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.remote.link }}))\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Nuevas funciones" },
  { message = "^fix", group = "Correcciones" },
  { message = "^style", group = "Estilos / UI" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentación" },
  { message = "^perf", group = "Rendimiento" },
  { message = "^chore", group = "Mantenimiento" },
  { message = "^\\[skip ci\\]", skip = true },
  { message = ".*", group = "Cambios generales" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
